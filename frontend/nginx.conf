server {
    listen 80;
    server_name localhost;
    server_tokens off;

    # 允许上传最大 50MB 文件（HAR 文件可能较大）
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy —— 去掉 /api/ 前缀，后端路由不包含该前缀
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health check — 代理到后端 /health
    location = /health {
        proxy_pass http://backend:8000/health;
    }

    # Mock API reverse proxy —— 公开 Mock 端点，用于模拟第三方服务
    # 去掉前缀，后端路由为 /mock-api/{project_slug}/{service_slug}/{path:path}
    location /mock-api/ {
        proxy_pass http://backend:8000/mock-api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket 长连接超时（1 小时），防止巡检推送中断
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
